<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenvi AI - Create Account</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #faf9f6;
            --card-bg: rgba(255, 255, 255, 0.75);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --zenvi-red: #d32f2f;
            --zenvi-red-hover: #ff453a;
            --error-bg: #fef2f2;
            --error-text: #b91c1c;
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #faf9f6;
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Ambient glowing circles behind form */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(211, 47, 47, 0.04) 0%, rgba(250, 249, 246, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px 40px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
            text-align: center;
            animation: card-slide-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes card-slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Zenvi Animated Logo */
        .brand-logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .zenvi-logo {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.03));
        }
        .zenvi-logo circle {
            fill: #0f172a;
            animation: blink-anim 4s infinite;
            transform-origin: center;
        }
        .zenvi-logo line {
            stroke: #0f172a;
            stroke-width: 3;
            stroke-linecap: round;
        }
        .zenvi-logo .eye-left { transform-origin: 25px 20px; }
        .zenvi-logo .eye-right { transform-origin: 75px 20px; }

        @keyframes blink-anim {
            0%, 94%, 98%, 100% { transform: scaleY(1); }
            96% { transform: scaleY(0.05); }
        }

        .auth-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .auth-subtitle {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* Form styling */
        .form-group {
            text-align: left;
            margin-bottom: 16px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
            opacity: 0.7;
            display: flex;
            align-items: center;
            pointer-events: none;
        }
        .input-icon svg {
            width: 18px;
            height: 18px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            outline: none;
            color: var(--text-primary);
            transition: all 0.25s ease;
        }

        .form-input:focus {
            border-color: var(--zenvi-red);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.08);
        }

        /* Notices / Messages */
        .alert {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
            animation: alert-fade-in 0.3s ease-out;
        }

        @keyframes alert-fade-in {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-error {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid rgba(185, 28, 28, 0.15);
        }

        .btn-submit {
            width: 100%;
            background: var(--zenvi-red);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 10px;
            box-shadow: 0 6px 18px -4px rgba(211, 47, 47, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: var(--zenvi-red-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px -2px rgba(211, 47, 47, 0.35);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .auth-footer {
            margin-top: 24px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .auth-link {
            color: var(--zenvi-red);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.15s ease;
        }

        .auth-link:hover {
            color: var(--zenvi-red-hover);
            text-decoration: underline;
        }

        /* Password requirements guide */
        .password-requirements {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 4px;
            padding-left: 2px;
        }
    </style>
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="auth-container">
        <!-- Logo -->
        <div class="brand-logo-container">
            <svg class="zenvi-logo" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
                <circle class="eye-left" cx="25" cy="20" r="7" />
                <circle class="eye-right" cx="75" cy="20" r="7" />
                <line x1="25" y1="20" x2="75" y2="20" />
            </svg>
        </div>

        <h1 class="auth-title">Register</h1>
        <p class="auth-subtitle">Create your Zenvi AI account</p>

        <!-- Alert Notifications -->
        {% if error %}
        <div class="alert alert-error">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" style="flex-shrink: 0;">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="/register" method="post" autocomplete="on">
            <!-- Username field -->
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </span>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Min 3 alphanumeric chars" value="{{ username or '' }}" required autofocus>
                </div>
            </div>

            <!-- Email field -->
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" value="{{ email or '' }}" required>
                </div>
            </div>

            <!-- Submit button -->
            <button type="submit" class="btn-submit">
                <span>Create Account</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </form>

        <div class="auth-footer">
            <span>Already have an account? </span>
            <a href="/login" class="auth-link">Sign In</a>
        </div>
    </div>
</body>
</html>
